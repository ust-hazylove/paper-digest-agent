name: Daily Paper Digest

on:
  schedule:
    # 01:00 UTC = 09:00 Asia/Singapore (UTC+8)
    - cron: "0 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: daily-paper-digest
  cancel-in-progress: false

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run digest
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          MAIL_TO: "dtang123@connect.hkust-gz.edu.cn"
          MAIL_FROM: ${{ secrets.MAIL_FROM }}
        run: |
          python -m src.main --config config.json

      - name: Commit updated DB (dedup memory)
        run: |
          git config user.name "paper-digest-bot"
          git config user.email "paper-digest-bot@users.noreply.github.com"
          git add data/papers.db || true
          git commit -m "Update paper dedup DB" || echo "No changes"
          git push || echo "No push (fork/permission?)"
